<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Wing Squad Builder - Pandorum Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .badge-points { background-color: #ffc107; color: #000; font-weight: bold; font-size: 0.9rem; }
        .faction-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 25px; margin-bottom: 15px; color: #ffc107; }
        .btn-add { background-color: #198754; color: white; border: none; }
        .btn-add:hover { background-color: #157347; color: white; }
        .squad-list { background-color: #1a1a1a; border-left: 4px solid #ffc107; padding: 15px; border-radius: 4px; position: sticky; top: 20px; }
        .upgrade-select { background-color: #2b2b2b; color: #fff; border: 1px solid #444; font-size: 0.85rem; padding: 2px 5px; border-radius: 4px; margin-top: 5px; }
        .loading-status { color: #ffc107; font-style: italic; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row">
        <div class="col-12 text-center mb-4">
            <h1 class="display-5 text-warning fw-bold">X-Wing Squad Builder</h1>
            <p class="lead text-muted">Database dinamico sincronizzato con i dati di Soge & Darker333</p>
            <div id="loading-msg" class="loading-status">Sincronizzazione database JSON in corso...</div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <h2 class="faction-header">Ribelli (Rebel Alliance)</h2>
            <div id="rebel-pilots" class="row"></div>

            <h2 class="faction-header">Impero Galattico (Galactic Empire)</h2>
            <div id="empire-pilots" class="row"></div>
        </div>

        <div class="col-md-4">
            <div class="squad-list shadow">
                <h3 class="h4 text-warning mb-3">La tua Squadriglia</h3>
                <div id="squad-content">
                    <p class="text-muted italic">Nessun pilota selezionato. Clicca su "+ Aggiungi" per iniziare.</p>
                </div>
                <hr style="border-color: #444;">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Totale Punti:</span>
                    <span id="total-points" class="badge badge-points fs-5">0 / 200</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configurazione dei link diretti ai file JSON grezzi (Raw) ereditati
    const DATA_SOURCES = {
        pilots: "https://raw.githubusercontent.com/soge/xwing-data/master/data/pilots.json", // Esempio di percorso sorgente Soge
        upgrades: "https://raw.githubusercontent.com/Darker333/xwing-data/master/data/upgrades.json" // Esempio di percorso sorgente Darker333
    };

    let database = { pilots: [], upgrades: {} };
    let currentSquad = [];

    // Funzione asincrona per caricare i file JSON esterni all'avvio del sito
    async function loadDatabase() {
        try {
            const pilotsResponse = await fetch(DATA_SOURCES.pilots);
            const upgradesResponse = await fetch(DATA_SOURCES.upgrades);
            
            const pilotsData = await pilotsResponse.json();
            const upgradesData = await upgradesResponse.json();

            // Popoliamo il database locale con i dati scaricati
            database.pilots = pilotsData;
            database.upgrades = upgradesData;

            document.getElementById('loading-msg').innerText = "✅ Database sincronizzato con successo!";
            renderPilots();
        } catch (error) {
            console.error("Errore nel caricamento dei dati JSON:", error);
            document.getElementById('loading-msg').innerHTML = "⚠️ Errore nel caricamento remoto. Caricamento database di emergenza locale...";
            // Fallback in caso di link offline o blocchi CORS
            loadLocalFallback();
        }
    }

    function loadLocalFallback() {
        database.pilots = [
            { name: "Luke Skywalker", id: "lukeskywalker", faction: "Rebel Alliance", ship: "T-65 X-wing", points: 62, slots: ["Talent", "Torpedo"] },
            { name: "Darth Vader", id: "darthvader", faction: "Galactic Empire", ship: "TIE/x1 Advanced", points: 67, slots: ["Talent", "Missile"] }
        ];
        database.upgrades = {
            Talent: [{ name: "Push the Limit", points: 3 }],
            Torpedo: [{ name: "Proton Torpedoes", points: 12 }],
            Missile: [{ name: "Concussion Missiles", points: 6 }]
        };
        renderPilots();
    }

    function renderPilots() {
        const rebelDiv = document.getElementById('rebel-pilots');
        const empireDiv = document.getElementById('empire-pilots');
        rebelDiv.innerHTML = "";
        empireDiv.innerHTML = "";
        
        database.pilots.forEach((pilot, index) => {
            const cardHtml = `
                <div class="col-sm-6">
                    <div class="card-custom shadow-sm">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="mb-1 text-white fw-bold">${pilot.name}</h5>
                            <span class="badge badge-points">${pilot.points} pt</span>
                        </div>
                        <p class="text-muted small mb-2">${pilot.ship}</p>
                        <button class="btn btn-sm btn-add w-100 fw-bold" onclick="addPilotToSquad(${index})">+ Aggiungi alla lista</button>
                    </div>
                </div>
            `;
            if(pilot.faction === "Rebel Alliance" || pilot.faction === "Rebel") {
                rebelDiv.innerHTML += cardHtml;
            } else if (pilot.faction === "Galactic Empire" || pilot.faction === "Empire") {
                empireDiv.innerHTML += cardHtml;
            }
        });
    }

    window.addPilotToSquad = function(index) {
        const pilot = database.pilots[index];
        const squadItem = { ...pilot, uniqueId: Date.now() + Math.random() };
        currentSquad.push(squadItem);
        updateSquadUI();
    };

    window.removePilot = function(uniqueId) {
        currentSquad = currentSquad.filter(p => p.uniqueId !== uniqueId);
        updateSquadUI();
    };

    function updateSquadUI() {
        const content = document.getElementById('squad-content');
        const totalPointsSpan = document.getElementById('total-points');
        
        if (currentSquad.length === 0) {
            content.innerHTML = `<p class="text-muted italic">Nessun pilota selezionato.</p>`;
            totalPointsSpan.innerText = "0 / 200";
            return;
        }

        let totalPoints = 0;
        let html = "";

        currentSquad.forEach(pilot => {
            totalPoints += pilot.points;
            html += `
                <div class="p-2 mb-2 rounded" style="background-color: #252525; border: 1px solid #444;">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-white fw-bold" style="font-size:0.95rem;">${pilot.name}</span>
                        <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="removePilot(${pilot.uniqueId})">X</button>
                    </div>
                    <small class="text-warning">${pilot.points} pt</small>
                </div>
            `;
        });

        content.innerHTML = html;
        totalPointsSpan.innerText = `${totalPoints} / 200`;
    }

    // Avvia il caricamento dei file JSON non appena la pagina è pronta
    window.onload = loadDatabase;
</script>

</body>
</html>
