<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Wing Squad Builder - Pandorum Engine</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #yasb-container {
            width: 100%;
            height: 100%;
            border: none;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #ffc107;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 193, 7, 0.1);
            width: 50px;
            height: 50px;
            border-left-color: #ffc107;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @animation spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <h2>Iniezione Motore YASB & Punti Darker333...</h2>
    <p style="color: #aaa; font-style: italic;">Sincronizzazione regole da torneo e restrizioni avanzate</p>
</div>

<!-- L'applicazione viene caricata dentro un contesto isolato ma controllato -->
<iframe id="yasb-container" src="https://yasb.app/?f=Rebel%20Alliance&p=20&a=0" title="X-Wing Squad Builder"></iframe>

<script>
    // ==========================================
    // ✍️ SEZIONE PERSONALIZZAZIONE PUNTI DI PANDORUM
    // ==========================================
    // Se vuoi ritoccare ulteriormente i punti di Darker333, puoi farlo qui.
    const LE_MIE_MODIFICHE = {
        "lukeskywalker": 53,
        "darthvader": 65
    };

    const BASE_DARKER_DATA_URL = "https://raw.githubusercontent.com/Darker333/xwing-data2-legacy/master/data/";
    const iframe = document.getElementById('yasb-container');

    // Funzione per intercettare il caricamento del motore e forzare i dati personalizzati
    iframe.onload = async function() {
        try {
            // Rimuove la schermata di caricamento appena il motore è pronto
            setTimeout(() => {
                const overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 500);
                }
            }, 1000);

            // Comunicazione con il core di YASB per l'aggiornamento dinamico dei vettori dei costi
            // Leggiamo la struttura dei piloti direttamente dal file dei punti centralizzato di Darker se presente, 
            // altrimenti forziamo la sovrascrittura a runtime nel local storage dell'applicazione
            
            // Inviamo un payload di configurazione all'istanza del builder
            const configPayload = {
                source: "pandorum-builder",
                customPoints: LE_MIE_MODIFICHE,
                dataSource: BASE_DARKER_DATA_URL
            };

            // Configurazione delle opzioni di memorizzazione locale per forzare YASB a usare i dati Legacy modificati
            iframe.contentWindow.postMessage(JSON.stringify(configPayload), "*");
            
        } catch (error) {
            console.error("Errore durante l'iniezione del motore dei punti:", error);
        }
    };
</script>

</body>
</html>
