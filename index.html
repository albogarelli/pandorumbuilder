<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Wing Squad Builder - Pandorum & Darker Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .badge-points { background-color: #ffc107; color: #000; font-weight: bold; font-size: 0.9rem; }
        .faction-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 25px; margin-bottom: 15px; color: #ffc107; text-transform: uppercase; font-size: 1.4rem; }
        .btn-add { background-color: #198754; color: white; border: none; }
        .btn-add:hover { background-color: #157347; color: white; }
        .squad-list { background-color: #1a1a1a; border-left: 4px solid #ffc107; padding: 15px; border-radius: 4px; position: sticky; top: 20px; }
        .upgrade-select { background-color: #2b2b2b; color: #fff; border: 1px solid #444; font-size: 0.85rem; padding: 2px 5px; border-radius: 4px; margin-top: 5px; max-width: 100%; }
        .loading-status { color: #ffc107; font-style: italic; margin-bottom: 15px; }
        .pilot-ship-name { color: #aaa; font-size: 0.85rem; font-style: italic; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row">
        <div class="col-12 text-center mb-4">
            <h1 class="display-5 text-warning fw-bold">X-Wing Squad Builder</h1>
            <p class="lead text-muted">Punti aggiornati da Darker333 + Ritocchi di Pandorum</p>
            <div id="loading-msg" class="loading-status">Connessione al database di Darker333 in corso...</div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div id="factions-container">
                </div>
        </div>

        <div class="col-md-4">
            <div class="squad-list shadow">
                <h3 class="h4 text-warning mb-3">La tua Squadriglia</h3>
                <div id="squad-content">
                    <p class="text-muted italic">Nessun pilota selezionato. Clicca su "+ Aggiungi" per iniziare.</p>
                </div>
                <hr style="border-color: #444;">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Totale Punti:</span>
                    <span id="total-points" class="badge badge-points fs-5">0 / 200</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ✍️ QUI METTI SOLO LE TUE MODIFICHE PERSONALI
    // ==========================================
    // Se un punto di Darker non ti piace, lo sovrascrivi qui. Altrimenti lascialo vuoto {}.
    const I_MIEI_PUNTI = {
        "lukeskywalker": 53 // Esempio: se Darker lo ha messo a 59 e tu lo vuoi a 53
    };

    // Il link "Raw" che punta alla cartella pilots dentro la repository di Darker333
    const BASE_DARKER_URL = "https://raw.githubusercontent.com/Darker333/xwing-data2-legacy/master/data/pilots/";

    // Lista esatta dei file delle navi dei Ribelli e dell'Impero presenti da Darker
    // Il sistema li scaricherà tutti in un colpo solo da internet!
    const FILE_NAVI = [
        // Ribelli
        "rebel-alliance/t-65-x-wing.json",
        "rebel-alliance/btl-a4-y-wing.json",
        "rebel-alliance/rz-1-a-wing.json",
        "rebel-alliance/modified-yt-1300.json",
        // Impero
        "galactic-empire/tie-ln-fighter.json",
        "galactic-empire/tie-in-interceptor.json",
        "galactic-empire/tie-advanced-x1.json",
        "galactic-empire/firespray-class-patrol-craft.json"
    ];

    let database = { pilots: [], upgrades: {} };
    let currentSquad = [];

    const FACTION_NAMES = {
        "rebelalliance": "Ribelli (Rebel Alliance)",
        "galacticempire": "Impero Galattico (Galactic Empire)",
        "scum": "Feccia e Malavita (Scum and Villainy)"
    };

    function getCustomCost(pilot) {
        if (I_MIEI_PUNTI[pilot.xws] !== undefined) {
            return I_MIEI_PUNTI[pilot.xws];
        }
        return pilot.cost || 0;
    }

    async function loadDatabase() {
        let loadedCount = 0;
        try {
            for (const file di FILE_NAVI) {
                const res = await fetch(BASE_DARKER_URL + file);
                if (res.ok) {
                    const shipData = await res.json();
                    if (shipData.pilots) {
                        shipData.pilots.forEach(p => {
                            database.pilots.push({
                                name: p.name,
                                xws: p.xws,
                                faction: shipData.faction,
                                ship: shipData.name,
                                points: getCustomCost(p),
                                slots: p.slots || [],
                                initiative: p.initiative || 1
                            });
                        });
                        loadedCount++;
                    }
                }
            }

            if (loadedCount > 0) {
                document.getElementById('loading-msg').innerHTML = "✅ Database di Darker333 caricato con successo!";
                renderFactions();
            } else {
                document.getElementById('loading-msg').innerHTML = "⚠️ Attenzione: Nessun file trovato. Verificare i percorsi della repository.";
            }
        } catch (error) {
            console.error(error);
            document.getElementById('loading-msg').innerHTML = "⚠️ Errore di connessione con la repository di Darker333.";
        }
    }

    function renderFactions() {
        const container = document.getElementById('factions-container');
        container.innerHTML = "";

        const factions = [...new Set(database.pilots.map(p => p.faction))];

        factions.forEach(factionId => {
            const factionPilots = database.pilots.filter(p => p.faction === factionId);
            const factionName = FACTION_NAMES[factionId] || factionId;

            let factionHtml = `<h2 class="faction-header">${factionName}</h2><div class="row">`;
            factionPilots.sort((a, b) => b.initiative - a.initiative);

            factionPilots.forEach(pilot => {
                const index = database.pilots.indexOf(pilot);
                factionHtml += `
                    <div class="col-sm-6 col-lg-4">
                        <div class="card-custom shadow-sm">
                            <div class="d-flex justify-content-between align-items-start">
                                <h6 class="mb-1 text-white fw-bold">(${pilot.initiative}) ${pilot.name}</h6>
                                <span class="badge badge-points">${pilot.points} pt</span>
                            </div>
                            <p class="pilot-ship-name mb-2">${pilot.ship}</p>
                            <button class="btn btn-sm btn-add w-100 fw-bold py-1" onclick="addPilotToSquad(${index})">+ Aggiungi</button>
                        </div>
                    </div>
                `;
            });

            factionHtml += `</div>`;
            container.innerHTML += factionHtml;
        });
    }

    window.addPilotToSquad = function(index) {
        const pilot = database.pilots[index];
        const squadItem = {
            ...pilot,
            uniqueId: Date.now() + Math.random()
        };
        currentSquad.push(squadItem);
        updateSquadUI();
    };

    window.removePilot = function(uniqueId) {
        currentSquad = currentSquad.filter(p => p.uniqueId !== uniqueId);
        updateSquadUI();
    };

    function updateSquadUI() {
        const content = document.getElementById('squad-content');
        const totalPointsSpan = document.getElementById('total-points');
        
        if (currentSquad.length === 0) {
            content.innerHTML = `<p class="text-muted italic">Nessun pilota selezionato.</p>`;
            totalPointsSpan.innerText = "0 / 200";
            return;
        }

        let totalPoints = 0;
        let html = "";

        currentSquad.forEach(pilot => {
            totalPoints += pilot.points;
            html += `
                <div class="p-2 mb-2 rounded" style="background-color: #252525; border: 1px solid #444;">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-white fw-bold" style="font-size:0.9rem;">${pilot.name}</span>
                        <button class="btn btn-sm btn-outline-danger py-0 px-1" style="font-size:0.7rem;" onclick="removePilot(${pilot.uniqueId})">X</button>
                    </div>
                    <small class="text-warning" style="font-size:0.75rem;">${pilot.points} pt</small>
                </div>
            `;
        });

        content.innerHTML = html;
        totalPointsSpan.innerText = `${totalPoints} / 200`;
    }

    window.onload = loadDatabase;
</script>

</body>
</html>
