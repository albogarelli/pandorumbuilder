<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>X-Wing Pandorum Builder</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #builder-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<iframe id="builder-frame" src="https://xwing-legacy.com/" title="X-Wing Builder"></iframe>

<script>
    const iframe = document.getElementById('builder-frame');
    const customPointsUrl = 'https://raw.githubusercontent.com/albogarelli/pandorumbuilder/master/custom/pandorum.json';

    // Una volta caricato il builder, inviamo i tuoi punti personalizzati
    iframe.onload = function() {
        fetch(customPointsUrl)
            .then(response => response.json())
            .then(data => {
                iframe.contentWindow.postMessage({
                    type: 'points_override',
                    data: data
                }, '*');
            });
    };
</script>

</body>
</html>
